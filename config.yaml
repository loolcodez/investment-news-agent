watchlist:
  - AMD
  - GOOGL
  - INTC
  - MRVL
  - NVDA
  - NIO
  - OUST

themes:
  - General semiconductor news
  - AI datacenters
  - Humanoid robots
  - Interest rates
  - China EV

rss_feeds:
  - name: Reuters Technology (Google News)
    url: https://news.google.com/rss/search?q=source:Reuters+technology&hl=en-US&gl=US&ceid=US:en
    enabled: true
  - name: Yahoo Finance Tech
    url: https://finance.yahoo.com/news/rssindex
    enabled: true
  - name: CN EV Post
    url: https://cnevpost.com/feed/
    enabled: true
  - name: SEC Filings
    url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcurrent&type=8-K&company=&datea=&owner=include&start=0&count=40&output=atom
    enabled: true

limits:
  max_items_per_run: 40
  min_keyword_hits: 1
  fallback_keep: 5
  max_openai_retries: 2
  request_timeout_seconds: 30

reporting:
  archive: true
  min_highlight_relevance: 7
  max_highlights: 5

storage:
  sqlite_path: data/news_agent.db
  reanalyze_after_hours: 24

retention:
  raw_days: 30
  low_relevance_days: 90
  high_relevance_days: 365
  high_relevance_threshold: 8
  run_history_days: 90
